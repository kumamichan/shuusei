<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dulce 幹部MTGダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0C0A;--surface:#151310;--card:#1C1A16;--card2:#231F1A;
  --gold:#C8A45A;--gold2:#E4C07A;
  --text:#F0EAE0;--muted:#8A7F6E;--border:#2E2A22;--border2:#3D3730;
  --green:#4A8C6A;--blue:#5A7AAC;--red:#C46A5A;
  --oro:#C8A45A;--mem:#5A7AAC;--plata:#8A7F6E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hdr-logo{display:flex;align-items:center;gap:12px;}
.hdr-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#8A6A2A);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.hdr-logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;}
.hdr-logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;}
.hdr-right{display:flex;align-items:center;gap:16px;}
.hdr-date{font-family:'Syne',sans-serif;font-size:13px;color:var(--gold);font-weight:600;}
.hdr-updated{font-size:11px;color:var(--muted);}
.reload-btn{padding:8px 16px;background:rgba(200,164,90,0.12);border:1px solid rgba(200,164,90,0.3);border-radius:8px;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif;}
.reload-btn:hover{background:rgba(200,164,90,0.2);}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:24px 20px 60px;}

/* KPI BAR */
.kpi-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.kpi-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;}
.kpi-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--gold2);margin-bottom:6px;}
.kpi-sub{font-size:11px;color:var(--muted);}
.kpi-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width 0.8s ease;}
.kpi-bar-fill.green{background:var(--green);}
.kpi-bar-fill.gold{background:var(--gold);}
.kpi-bar-fill.red{background:var(--red);}

/* SECTION TITLE */
.sec-title{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}

/* STAFF TABLE */
.table-wrap{overflow-x:auto;margin-bottom:28px;}
.staff-table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px;}
.staff-table th{background:var(--card2);color:var(--muted);padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);font-weight:600;font-family:'Syne',sans-serif;font-size:10px;letter-spacing:1px;white-space:nowrap;}
.staff-table th:first-child{text-align:left;}
.staff-table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:right;color:var(--text);font-size:12px;}
.staff-table td:first-child{text-align:left;font-weight:700;color:var(--text);}
.staff-table tr:last-child td{border-bottom:none;}
.staff-table tr:hover td{background:rgba(200,164,90,0.04);}
.staff-table .total-row td{background:rgba(74,140,106,0.08);font-weight:700;border-top:2px solid var(--border);}
.pct-cell{font-weight:700;}
.pct-cell.pos{color:var(--green);}
.pct-cell.neg{color:var(--red);}
.pct-cell.warn{color:var(--gold);}
.sales-cell{font-weight:700;color:var(--gold2);}
.tgt-cell{color:var(--blue);}
.diff-cell.pos{color:var(--green);}
.diff-cell.neg{color:var(--red);}

/* PROGRESS BAR IN TABLE */
.mini-bar-wrap{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px;}
.mini-bar-fill{height:100%;border-radius:3px;}

/* MONTHLY TABLE */
.monthly-table{width:100%;border-collapse:collapse;font-size:11px;}
.monthly-table th{background:var(--card2);color:var(--muted);padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap;}
.monthly-table th:first-child{text-align:left;}
.monthly-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text);}
.monthly-table td:first-child{text-align:left;color:var(--muted);font-weight:600;}
.monthly-table tr:last-child td{border-bottom:none;}
.monthly-table .current-month td{background:rgba(200,164,90,0.06);}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-box{background:rgba(196,106,90,0.08);border:1px solid rgba(196,106,90,0.25);border-radius:12px;padding:20px;text-align:center;color:var(--red);font-size:13px;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:20px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-icon">📊</div>
    <div>
      <div class="hdr-logo-text">Dulce 幹部MTGダッシュボード</div>
      <div class="hdr-logo-sub">Management Dashboard</div>
    </div>
  </div>
  <div class="hdr-right">
    <div>
      <div class="hdr-date" id="hdr-date"></div>
      <div class="hdr-updated" id="hdr-updated">読み込み中...</div>
    </div>
    <button class="reload-btn" onclick="loadData()">🔄 更新</button>
  </div>
</div>

<div class="main">
  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      スプレッドシートからデータを取得中...
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// GAS URL（sales_unified.htmlと同じURLを設定）
// ════════════════════════════════════════
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzba3FtxXdNaP1zz-xBUN2-B3Vcz2kxPD4Iz6fujJHjFm2vHfYFGHGNntOHVx-6XPEqiA/exec';

var data = null;

function fmtYen(n){ return '¥'+(n||0).toLocaleString(); }
function fmtNum(n){ return (n||0).toLocaleString(); }
function pctColor(p){ return p>=100?'pos':p>=80?'warn':'neg'; }
function barColor(p){ return p>=100?'var(--green)':p>=80?'var(--gold)':'var(--red)'; }

// ── 日付表示 ──
(function(){
  var d = new Date();
  document.getElementById('hdr-date').textContent =
    d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+['日','月','火','水','木','金','土'][d.getDay()]+'）';
})();

// ── データ取得 ──
async function loadData(){
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="loading-spinner"></div>スプレッドシートからデータを取得中...</div>';

  try {
    var res = await fetch(GAS_URL + '?action=mtg', {
      method: 'GET',
      mode: 'cors'
    });
    var json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || 'エラー');
    data = json;
    document.getElementById('hdr-updated').textContent = '最終更新: ' + json.updatedAt;
    render(json);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">❌ データの取得に失敗しました。GASのURLを確認してください。<br><small>' + e.message + '</small></div>';
  }
}

// ── 描画 ──
function render(d){
  var html = '';
  var s = d.summary;
  var salesPct = s.target > 0 ? Math.round(s.sales/s.target*1000)/10 : 0;

  // KPIバー
  html += '<div class="kpi-bar">';
  html += kpiBox('売上合計', fmtYen(s.sales), '目標 '+fmtYen(s.target), salesPct);
  html += kpiBox('着地見込み', fmtYen(s.landing), s.target>0?'目標比 '+Math.round(s.landing/s.target*1000)/10+'%':'--', s.target>0?Math.round(s.landing/s.target*1000)/10:0);
  html += kpiBox('新規客数', fmtNum(s.newCount)+'人', '既存 '+fmtNum(s.retCount)+'人', null);
  html += kpiBox('総客数', fmtNum(s.total)+'人', d.month+'月累計', null);
  html += '</div>';

  // スタッフ別進捗テーブル
  html += '<div class="card">';
  html += '<div class="sec-title">👤 スタッフ別 当月進捗（'+d.year+'年'+d.month+'月）</div>';
  html += '<div class="table-wrap">';
  html += '<table class="staff-table">';
  html += '<thead><tr>';
  html += '<th>担当スタッフ</th>';
  html += '<th>売上実績</th>';
  html += '<th>売上目標</th>';
  html += '<th>差異</th>';
  html += '<th>達成率</th>';
  html += '<th>着地見込み</th>';
  html += '<th>新規客数</th>';
  html += '<th>既存客数</th>';
  html += '<th>総客数</th>';
  html += '</tr></thead><tbody>';

  var totalSales=0, totalTarget=0, totalLanding=0, totalNC=0, totalRC=0, totalTC=0;

  for (var i=0; i<d.staff.length; i++){
    var st = d.staff[i];
    var pct = st.target>0 ? Math.round(st.sales/st.target*1000)/10 : 0;
    var diff = st.target>0 ? st.sales - st.target : null;
    var barW = Math.min(pct, 100);
    totalSales   += st.sales;
    totalTarget  += st.target;
    totalLanding += st.landing;
    totalNC      += st.newCount;
    totalRC      += st.retCount;
    totalTC      += st.total;

    html += '<tr>';
    html += '<td>'+st.name+'</td>';
    html += '<td class="sales-cell">'+fmtYen(st.sales)+'</td>';
    html += '<td class="tgt-cell">'+(st.target>0?fmtYen(st.target):'未設定')+'</td>';
    html += '<td class="diff-cell '+(diff!==null?(diff>=0?'pos':'neg'):'')+'">'+
            (diff!==null?(diff>=0?'+':'')+fmtYen(diff):'--')+'</td>';
    html += '<td>';
    if (st.target>0){
      html += '<span class="pct-cell '+pctColor(pct)+'">'+pct+'%</span>';
      html += '<span class="mini-bar-wrap"><span class="mini-bar-fill" style="width:'+barW+'%;background:'+barColor(pct)+';"></span></span>';
    } else { html += '<span style="color:var(--muted)">--</span>'; }
    html += '</td>';
    html += '<td>'+(st.landing>0?fmtYen(st.landing):'--')+'</td>';
    html += '<td>'+fmtNum(st.newCount)+'人</td>';
    html += '<td>'+fmtNum(st.retCount)+'人</td>';
    html += '<td style="font-weight:700;">'+fmtNum(st.total)+'人</td>';
    html += '</tr>';
  }

  // 合計行
  var totPct = totalTarget>0 ? Math.round(totalSales/totalTarget*1000)/10 : 0;
  var totDiff = totalTarget>0 ? totalSales-totalTarget : null;
  html += '<tr class="total-row">';
  html += '<td>合　計</td>';
  html += '<td class="sales-cell">'+fmtYen(totalSales)+'</td>';
  html += '<td class="tgt-cell">'+(totalTarget>0?fmtYen(totalTarget):'--')+'</td>';
  html += '<td class="diff-cell '+(totDiff!==null?(totDiff>=0?'pos':'neg'):'')+'">'+
          (totDiff!==null?(totDiff>=0?'+':'')+fmtYen(totDiff):'--')+'</td>';
  html += '<td><span class="pct-cell '+pctColor(totPct)+'">'+totPct+'%</span></td>';
  html += '<td>'+(totalLanding>0?fmtYen(totalLanding):'--')+'</td>';
  html += '<td>'+fmtNum(totalNC)+'人</td>';
  html += '<td>'+fmtNum(totalRC)+'人</td>';
  html += '<td style="font-weight:700;">'+fmtNum(totalTC)+'人</td>';
  html += '</tr>';
  html += '</tbody></table></div></div>';

  // 年間月別推移テーブル
  html += '<div class="card">';
  html += '<div class="sec-title">📈 年間 月別推移（'+d.year+'年）</div>';
  html += '<div class="table-wrap">';
  html += '<table class="monthly-table">';
  html += '<thead><tr><th>項目</th>';
  for (var mi=0; mi<d.monthly.length; mi++){
    html += '<th'+(d.monthly[mi].month===(d.month+'月')?' style="color:var(--gold2);"':'')+'>'+d.monthly[mi].month+'</th>';
  }
  html += '</tr></thead><tbody>';

  // 売上実績行
  html += '<tr><td>売上実績</td>';
  for (var mi=0; mi<d.monthly.length; mi++){
    var mv = d.monthly[mi];
    var isCurrent = mv.month === (d.month+'月');
    html += '<td'+(isCurrent?' style="color:var(--gold2);font-weight:700;"':'')+'>'+
            (mv.sales>0?fmtYen(mv.sales):'--')+'</td>';
  }
  html += '</tr>';

  // 売上目標行
  html += '<tr><td>売上目標</td>';
  for (var mi=0; mi<d.monthly.length; mi++){
    var mv = d.monthly[mi];
    html += '<td style="color:var(--blue);">'+(mv.target>0?fmtYen(mv.target):'--')+'</td>';
  }
  html += '</tr>';

  // 達成率行
  html += '<tr><td>達成率</td>';
  for (var mi=0; mi<d.monthly.length; mi++){
    var mv = d.monthly[mi];
    var pp = mv.target>0&&mv.sales>0 ? Math.round(mv.sales/mv.target*1000)/10 : null;
    html += '<td class="pct-cell '+(pp!==null?pctColor(pp):'')+'">'+
            (pp!==null?pp+'%':'--')+'</td>';
  }
  html += '</tr>';

  html += '</tbody></table></div></div>';

  document.getElementById('content').innerHTML = html;
}

function kpiBox(label, val, sub, pct){
  var barW = pct !== null ? Math.min(pct, 100) : 0;
  var bc   = pct !== null ? barColor(pct) : 'var(--muted)';
  return '<div class="kpi">'+
    '<div class="kpi-label">'+label+'</div>'+
    '<div class="kpi-val">'+val+'</div>'+
    '<div class="kpi-sub">'+sub+'</div>'+
    (pct !== null ? '<div class="kpi-bar-wrap"><div class="kpi-bar-fill" style="width:'+barW+'%;background:'+bc+';"></div></div>' : '')+
  '</div>';
}

// 初期ロード
loadData();
</script>
</body>
</html>
